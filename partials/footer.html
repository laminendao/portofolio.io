<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
<script>
    particlesJS('particles-js', {
        particles: {
            number: { value: 60, density: { enable: true, value_area: 800 } },
            color: { value: "#6a11cb" },
            shape: { type: "circle" },
            opacity: { value: 0.4, random: true },
            size: { value: 3, random: true },
            line_linked: { enable: true, distance: 150, color: "#2575fc", opacity: 0.25, width: 1 },
            move: { enable: true, speed: 1.5, direction: "none", random: true, straight: false, out_mode: "out" }
        },
        interactivity: {
            detect_on: "canvas",
            events: { onhover: { enable: true, mode: "grab" }, onclick: { enable: true, mode: "push" }, resize: true }
        }
    });

    const typed = new Typed('#typed', {
        strings: [
            'Explainable AI Researcher',
            'Statistical Learning Specialist',
            'Time Series & XAI Enthusiast',
            'Data Scientist & PhD Candidate',
            'Predictive Maintenance Explorer'
        ],
        typeSpeed: 60,
        backSpeed: 35,
        loop: true
    });

    window.addEventListener('scroll', () => {
        const navbar = document.querySelector('.navbar');
        if (window.scrollY > 50) {
            navbar.style.padding = '10px 0';
            navbar.style.boxShadow = '0 5px 20px rgba(0,0,0,0.3)';
        } else {
            navbar.style.padding = '15px 0';
            navbar.style.boxShadow = 'none';
        }
    });

    function loadNewsFeed() {
        const newsFeed = document.getElementById('newsFeed');
        if (!newsFeed) return;

        // Priorité : localStorage (pour les ajouts récents), puis news.json
        const raw = localStorage.getItem('newsItems');
        const localItems = raw ? JSON.parse(raw) : [];

        if (localItems.length > 0) {
            // Afficher les actualités locales immédiatement
            const sorted = localItems.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
            newsFeed.innerHTML = '';
            sorted.slice(0, 6).forEach(item => {
                const card = document.createElement('div');
                card.className = 'col-md-6 col-lg-4';
                card.innerHTML = `
                    <div class="news-card">
                        <div class="news-date">${new Date(item.date).toLocaleDateString('fr-FR')}</div>
                        <div class="news-title">${item.title}</div>
                        <div class="news-text">${item.content}</div>
                    </div>
                `;
                newsFeed.appendChild(card);
            });
        } else {
            // Fallback sur news.json si rien en local
            fetch('news.json', { cache: 'no-store' })
                .then(resp => {
                    if (!resp.ok) throw new Error('news.json introuvable');
                    return resp.json();
                })
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        newsFeed.innerHTML = '<p class="text-muted">Aucune actualité pour le moment.</p>';
                        return;
                    }

                    const sorted = data.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
                    newsFeed.innerHTML = '';
                    sorted.slice(0, 6).forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'col-md-6 col-lg-4';
                        card.innerHTML = `
                            <div class="news-card">
                                <div class="news-date">${new Date(item.date).toLocaleDateString('fr-FR')}</div>
                                <div class="news-title">${item.title}</div>
                                <div class="news-text">${item.content}</div>
                            </div>
                        `;
                        newsFeed.appendChild(card);
                    });
                })
                .catch(err => {
                    console.warn('Impossible de charger news.json', err);
                    newsFeed.innerHTML = '<p class="text-muted">Aucune actualité pour le moment.</p>';
                });
        }
    }

    // smooth scrolling de nav
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
            e.preventDefault();
            const target = document.querySelector(this.getAttribute('href'));
            if (target) {
                window.scrollTo({ top: target.offsetTop - 70, behavior: 'smooth' });
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            }
        });
    });

    loadNewsFeed();
</script>
